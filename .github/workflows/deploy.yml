name: Deploy JenaAI Website

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Prepare files
        run: |
          # Copy site files to root
          cp -r site/* .
          # Make sure avatars directory exists at root
          mkdir -p avatars
          # Copy VRM models from repo avatars/ to root avatars/
          cp ../avatars/*.vrm avatars/ 2>/dev/null || true
          cp ../avatars/*.jpg avatars/ 2>/dev/null || true
          cp ../avatars/*.png avatars/ 2>/dev/null || true
          # Also copy from repo root avatars
          ls -la
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
