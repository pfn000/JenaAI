name: Deploy JenaAI Website

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Copy site files to root
        run: |
          # Copy all site files to root for GitHub Pages
          cp -r site/* . 2>/dev/null || true
          # Ensure avatars and models are accessible
          mkdir -p assets/avatars assets/models
          cp avatars/*.vrm assets/avatars/ 2>/dev/null || true
          cp avatars/*.jpg assets/avatars/ 2>/dev/null || true
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
