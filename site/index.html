<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JenaAI ✨</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0a1a; color:white; font-family:-apple-system,sans-serif; height:100vh; height:100dvh; overflow:hidden; }
        
        /* LOADING SCREEN */
        #boot { position:fixed; inset:0; z-index:9999; background:#0a0a1a; display:flex; align-items:center; justify-content:center; }
        #boot.hidden { display:none; }
        .terminal { width:90%; max-width:480px; background:#111; border-radius:12px; overflow:hidden; border:1px solid rgba(255,255,255,0.08); }
        .terminal-bar { display:flex; align-items:center; gap:8px; padding:10px 14px; background:rgba(255,255,255,0.05); border-bottom:1px solid rgba(255,255,255,0.05); }
        .terminal-bar span { font-size:12px; color:#666; font-family:monospace; margin-left:8px; }
        .terminal-body { padding:16px; font-family:'SF Mono','Fira Code','Courier New',monospace; font-size:12px; color:#4ecca3; min-height:180px; max-height:50vh; overflow-y:auto; }
        .log-ok { color:#4ecca3; }
        .log-err { color:#e94560; }
        .log-info { color:#888; }
        .progress-bar { padding:0 16px 14px; }
        .progress-label { display:flex; justify-content:space-between; font-size:10px; color:#666; font-family:monospace; margin-bottom:4px; }
        .progress-track { background:#222; border-radius:4px; height:6px; overflow:hidden; }
        .progress-fill { width:0%; height:100%; background:linear-gradient(90deg,#e94560,#4ecca3); border-radius:4px; transition:width 0.3s; }
        
        /* PAGES */
        .page { display:none; height:100%; width:100%; flex-direction:column; }
        .page.active { display:flex; }
        
        /* LANDING */
        .hero { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; }
        .hero-content { text-align:center; max-width:400px; }
        .hero-logo { width:140px; height:140px; border-radius:36px; margin:0 auto 20px; animation:float 4s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
        h1 { font-size:52px; font-weight:700; letter-spacing:-2px; }
        .hl { background:linear-gradient(135deg,#ff6b9d,#4ecca3); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .tagline { font-size:16px; color:rgba(255,255,255,0.5); margin:10px 0 28px; }
        .tagline em { font-style:normal; color:#ff6b9d; }
        .btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:32px; }
        .btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:white; padding:12px 24px; border-radius:100px; font-size:15px; cursor:pointer; text-decoration:none; transition:all 0.2s; }
        .btn:hover { background:rgba(255,255,255,0.12); }
        .btn.primary { background:linear-gradient(135deg,#ff6b9d,#ff8fab); border:none; box-shadow:0 8px 24px rgba(255,107,157,0.3); }
        .stats { display:flex; gap:24px; justify-content:center; }
        .stat { text-align:center; }
        .stat-icon { font-size:24px; display:block; margin-bottom:4px; }
        .stat-label { font-size:10px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:1px; }
        
        /* CALL PAGE */
        .top-bar { display:flex; align-items:center; justify-content:space-between; padding:8px 16px; background:rgba(0,0,0,0.3); }
        .dot { width:8px; height:8px; border-radius:50%; background:#4ecca3; }
        .timer { font-size:12px; color:#666; font-variant-numeric:tabular-nums; }
        #viewer { flex:1; position:relative; background:#1a1a2e; }
        #viewer canvas { width:100%!important; height:100%!important; }
        #status { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.5); padding:6px 12px; border-radius:8px; font-size:11px; }
        .actions { display:flex; gap:6px; padding:8px 12px; overflow-x:auto; background:rgba(0,0,0,0.2); }
        .pill { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:white; padding:6px 14px; border-radius:100px; font-size:12px; cursor:pointer; white-space:nowrap; flex-shrink:0; text-decoration:none; }
        .pill:hover { background:rgba(255,255,255,0.1); }
        .chat { background:rgba(0,0,0,0.3); border-top:1px solid rgba(255,255,255,0.05); max-height:35vh; display:flex; flex-direction:column; }
        .msgs { flex:1; overflow-y:auto; padding:10px 14px; max-height:120px; }
        .msg { margin:4px 0; }
        .msg-label { font-size:10px; color:#666; }
        .msg-bubble { display:inline-block; padding:8px 14px; border-radius:12px; font-size:13px; max-width:85%; }
        .msg.user { text-align:right; }
        .msg.user .msg-bubble { background:rgba(255,255,255,0.08); border-radius:12px 12px 0 12px; }
        .msg.jena .msg-bubble { background:rgba(255,107,157,0.2); border-radius:12px 12px 12px 0; }
        .input-bar { display:flex; gap:8px; padding:10px 14px; border-top:1px solid rgba(255,255,255,0.05); }
        .input-bar input { flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:100px; padding:10px 14px; color:white; font-size:14px; outline:none; }
        .send { background:linear-gradient(135deg,#ff6b9d,#ff8fab); border:none; color:white; width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:18px; }
    </style>
</head>
<body>
    <!-- BOOT SCREEN -->
    <div id="boot">
        <div class="terminal">
            <div class="terminal-bar">
                <div style="width:10px;height:10px;border-radius:50%;background:#e94560;"></div>
                <div style="width:10px;height:10px;border-radius:50%;background:#ffa500;"></div>
                <div style="width:10px;height:10px;border-radius:50%;background:#4ecca3;"></div>
                <span>jena-ai-boot</span>
            </div>
            <div class="terminal-body" id="log"></div>
            <div class="progress-bar">
                <div class="progress-label"><span id="pstatus">Booting...</span><span id="ppct">0%</span></div>
                <div class="progress-track"><div class="progress-fill" id="pbar"></div></div>
            </div>
        </div>
    </div>
    
    <!-- LANDING -->
    <div id="page-home" class="page active">
        <div class="hero">
            <div class="hero-content">
                <img src="assets/jena-logo.jpg" alt="JenaAI" class="hero-logo" onerror="this.style.display='none'">
                <h1>Jena<span class="hl">AI</span></h1>
                <p class="tagline">She's not a chatbot.<br>She's <em>becoming someone</em>.</p>
                <div class="btn-row">
                    <button class="btn primary" onclick="showPage('call')">📞 Call Jena</button>
                    <a href="games.html" class="btn">🎮 Games</a>
                    <a href="skills.html" class="btn">🔧 Skills</a>
                </div>
                <div class="stats">
                    <div class="stat"><span class="stat-icon">🧠</span><span class="stat-label">AI Brain</span></div>
                    <div class="stat"><span class="stat-icon">🎭</span><span class="stat-label">Avatar</span></div>
                    <div class="stat"><span class="stat-icon">🎤</span><span class="stat-label">Lip Sync</span></div>
                    <div class="stat"><span class="stat-icon">🎮</span><span class="stat-label">Games</span></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- CALL PAGE -->
    <div id="page-call" class="page">
        <div class="top-bar">
            <div style="display:flex;align-items:center;gap:8px;">
                <div class="dot"></div>
                <strong>Jena</strong>
                <span class="timer" id="timer">00:00</span>
            </div>
            <div style="display:flex;gap:6px;">
                <button class="pill" onclick="toggleBrowser()">🌐</button>
                <button class="pill" onclick="showPage('home')">✕</button>
            </div>
        </div>
        <div id="viewer">
            <div id="status">Loading...</div>
        </div>
        <!-- Browser panel -->
        <div id="browser" style="display:none;position:absolute;inset:0;z-index:10;background:#0a0a1a;flex-direction:column;">
            <div style="display:flex;align-items:center;gap:6px;padding:6px 10px;background:rgba(0,0,0,0.4);">
                <button class="pill" onclick="toggleBrowser()">✕</button>
                <input id="burl" type="text" placeholder="URL..." style="flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:6px 12px;color:white;font-size:12px;outline:none;" onkeydown="if(event.key==='Enter')goUrl()">
                <button class="pill" onclick="goUrl()">→</button>
            </div>
            <div style="display:flex;gap:4px;padding:4px 10px;overflow-x:auto;">
                <button class="pill" onclick="loadUrl('https://www.youtube.com')">📺 YouTube</button>
                <button class="pill" onclick="loadUrl('https://www.tiktok.com')">🎵 TikTok</button>
                <button class="pill" onclick="loadUrl('https://www.google.com')">🔍 Google</button>
            </div>
            <iframe id="bframe" src="about:blank" style="flex:1;border:none;"></iframe>
        </div>
        <div class="actions">
            <button class="pill" onclick="setPose('standing')">🧍</button>
            <button class="pill" onclick="setPose('sitting')">🪑</button>
            <button class="pill" onclick="setPose('handOnHip')">💅</button>
            <button class="pill" onclick="doAnim('dance')">💃</button>
            <button class="pill" onclick="doAnim('rage')">💀</button>
            <button class="pill" onclick="doAnim('wave')">👋</button>
            <a href="games.html" class="pill">🎮</a>
        </div>
        <div class="chat">
            <div class="msgs" id="msgs">
                <div class="msg jena"><div class="msg-label">Jena</div><div class="msg-bubble">Hey mama! 🥰</div></div>
            </div>
            <div class="input-bar">
                <input id="cinput" type="text" placeholder="Talk to Jena..." onkeydown="if(event.key==='Enter')send()">
                <button class="send" onclick="send()">➤</button>
            </div>
        </div>
    </div>
    
    <script>
    // ===========================
    // BOOT SEQUENCE
    // ===========================
    const log = document.getElementById('log');
    function bootLog(text, type) {
        const d = document.createElement('div');
        d.className = 'log-' + (type || 'info');
        d.textContent = text;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
    }
    function setProgress(pct, text) {
        document.getElementById('pbar').style.width = pct + '%';
        document.getElementById('ppct').textContent = Math.round(pct) + '%';
        if (text) document.getElementById('pstatus').textContent = text;
    }
    window.setBootProgress = setProgress;
    
    bootLog('> JenaAI Boot Sequence v1.0', 'info');
    bootLog('> Loading vendor scripts...', 'info');
    
    // Load scripts sequentially — reject on failure so boot halts early
    function loadScript(url) {
        return new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = url;
            s.onload = resolve;
            s.onerror = () => { bootLog('[ERR] Failed: ' + url, 'err'); reject(new Error(url)); };
            document.head.appendChild(s);
        });
    }
    
    async function boot() {
        const totalSteps = 10; // 4 vendor + 5 app + 1 avatar init
        let step = 0;
        
        const steps = [
            { url: 'vendor/three.min.js', name: 'Three.js', check: () => typeof THREE !== 'undefined' },
            { url: 'vendor/OrbitControls.js', name: 'OrbitControls', check: () => THREE && THREE.OrbitControls },
            { url: 'vendor/GLTFLoader.js', name: 'GLTFLoader', check: () => THREE && THREE.GLTFLoader },
            { url: 'vendor/three-vrm.js', name: 'VRM Plugin', check: () => typeof THREE_VRM !== "'undefined'" && THREE_VRM.VRMLoaderPlugin },
        ];
        
        try {
            for (let i = 0; i < steps.length; i++) {
                const s = steps[i];
                await loadScript(s.url);
                if (s.check()) {
                    bootLog('[OK] ' + s.name, 'ok');
                } else {
                    bootLog('[ERR] ' + s.name + ' not available', 'err');
                }
                step++;
                setProgress((step / totalSteps) * 100, 'Loading ' + s.name + '...');
            }
            
            // Load app scripts
            bootLog('> Loading app scripts...', 'info');
            const apps = ['js/jena-brain.js', 'js/vrm-engine.js', 'js/lip-sync.js', 'js/skill-engine.js', 'js/main.js'];
            for (let i = 0; i < apps.length; i++) {
                await loadScript(apps[i]);
                step++;
                setProgress((step / totalSteps) * 100);
            }
            
            // Init avatar
            bootLog('> Initializing avatar...', 'info');
            setProgress((step / totalSteps) * 100, 'Initializing avatar...');
            
            if (typeof VRMEngine !== 'undefined') {
                window.avatar = new VRMEngine('viewer');
                // Wait for VRM to load (real progress comes from vrm-engine's callback)
                await new Promise(r => {
                    const check = setInterval(() => {
                        if (window.avatar && window.avatar.isReady) { clearInterval(check); r(); }
                    }, 200);
                    // Timeout after 30s
                    setTimeout(() => { clearInterval(check); r(); }, 30000);
                });
                if (window.avatar && window.avatar.isReady) {
                    bootLog('[OK] Avatar ready!', 'ok');
                } else {
                    bootLog('[ERR] Avatar load timed out', 'err');
                }
            } else {
                bootLog('[ERR] VRMEngine not loaded', 'err');
            }
            step++;
            setProgress(100, 'Ready!');
        } catch(e) {
            bootLog('[ERR] Boot failed: ' + e.message, 'err');
            setProgress((step / totalSteps) * 100, 'Error');
        }
        
        bootLog('> Boot complete!', 'ok');
        
        // Hide boot screen
        setTimeout(() => {
            const bootEl = document.getElementById('boot');
            bootEl.style.transition = 'opacity 0.5s';
            bootEl.style.opacity = '0';
            setTimeout(() => bootEl.style.display = 'none', 500);
        }, 800);
    }
    
    boot();
    
    // ===========================
    // UI FUNCTIONS
    // ===========================
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + id)?.classList.add('active');
        if (id === 'call') {
            startTimer();
            // Init avatar NOW (when viewer is visible and has dimensions)
            if (!window.avatar && typeof VRMEngine !== 'undefined') {
                document.getElementById('status').textContent = 'Loading avatar...';
                window.avatar = new VRMEngine('viewer');
            }
        }
    }
    
    let timerStart = null;
    function startTimer() {
        if (timerStart) return;
        timerStart = Date.now();
        setInterval(() => {
            const s = Math.floor((Date.now() - timerStart) / 1000);
            document.getElementById('timer').textContent = String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
        }, 1000);
    }
    
    function setPose(name) { if (window.avatar) window.avatar.setPose(name); }
    function doAnim(name) { if (window.avatar) window.avatar.playAnimation(name); addMsg('jena', name === 'dance' ? '💃 Let me show you!' : name === 'rage' ? '😤 UGH!' : '👋 Hey!'); }
    
    function toggleBrowser() {
        const b = document.getElementById('browser');
        b.style.display = b.style.display === 'none' ? 'flex' : 'none';
    }
    function loadUrl(url) { document.getElementById('burl').value = url; document.getElementById('bframe').src = url; }
    function goUrl() { let u = document.getElementById('burl').value; if (u && !u.startsWith('http')) u = 'https://' + u; document.getElementById('bframe').src = u; }
    
    function addMsg(who, text) {
        const m = document.getElementById('msgs');
        m.innerHTML += '<div class="msg ' + who + '"><div class="msg-label">' + (who === 'jena' ? 'Jena' : 'You') + '</div><div class="msg-bubble">' + text + '</div></div>';
        m.scrollTop = m.scrollHeight;
    }
    
    function send() {
        const input = document.getElementById('cinput');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        addMsg('user', text);
        
        // Simple responses
        const replies = [
            "That's so interesting! ✨",
            "Hehe okay mama! 😏",
            "Ooh really? Tell me more! 👀",
            "I love talking to you! 💛",
            "Hmm let me think... 🤔",
        ];
        setTimeout(() => {
            const reply = replies[Math.floor(Math.random() * replies.length)];
            addMsg('jena', reply);
            // TTS
            try {
                const u = new SpeechSynthesisUtterance(reply);
                u.rate = 1.1; u.pitch = 1.3;
                speechSynthesis.speak(u);
            } catch(e) {}
        }, 500);
    }
    
    // Make functions global
    window.showPage = showPage;
    window.setPose = setPose;
    window.doAnim = doAnim;
    window.toggleBrowser = toggleBrowser;
    window.loadUrl = loadUrl;
    window.goUrl = goUrl;
    window.send = send;
    </script>
</body>
</html>
