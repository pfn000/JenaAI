<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Jena VRM Viewer</title>
    <style>
        body { margin: 0; background: #1a1a2e; overflow: hidden; }
        canvas { display: block; }
        #info { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; font-size: 14px; background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 8px; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.js"
        }
    }
    </script>
</head>
<body>
    <div id="info">Loading VRM...</div>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        // Renderer with better settings
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: true,
            preserveDrawingBuffer: true 
        });
        renderer.setSize(800, 800);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x1a1a2e, 1);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        // Camera
        const camera = new THREE.PerspectiveCamera(30, 1, 0.1, 20);
        camera.position.set(0, 1.0, 3.5);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.screenSpacePanning = true;
        controls.target.set(0, 0.9, 0);
        controls.update();

        // Scene
        const scene = new THREE.Scene();

        // BETTER LIGHTING for anime style
        // Main light (warm)
        const mainLight = new THREE.DirectionalLight(0xfff4e6, 2.5);
        mainLight.position.set(1, 2, 1.5).normalize();
        scene.add(mainLight);

        // Fill light (cool)
        const fillLight = new THREE.DirectionalLight(0xc4d4ff, 1.0);
        fillLight.position.set(-1, 1, -0.5).normalize();
        scene.add(fillLight);

        // Rim light (backlight for depth)
        const rimLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        rimLight.position.set(0, 1, -2).normalize();
        scene.add(rimLight);

        // Ambient (soft fill)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        // Hemisphere light for natural sky/ground coloring
        const hemiLight = new THREE.HemisphereLight(0xaaddff, 0x443322, 0.5);
        scene.add(hemiLight);

        // Ground plane with subtle gradient
        const groundGeo = new THREE.CircleGeometry(2, 64);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x2a2a4e, 
            roughness: 0.8,
            metalness: 0.1
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        // Load VRM
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        let currentVrm = null;
        const urlParams = new URLSearchParams(window.location.search);
        const vrmFile = urlParams.get('file') || './avatars/vivi.vrm';

        document.getElementById('info').textContent = 'Loading: ' + vrmFile + '...';

        loader.load(
            vrmFile,
            (gltf) => {
                const vrm = gltf.userData.vrm;
                
                // Performance optimizations
                VRMUtils.removeUnnecessaryVertices(gltf.scene);
                VRMUtils.combineSkeletons(gltf.scene);
                VRMUtils.combineMorphs(vrm);
                
                // Disable frustum culling
                vrm.scene.traverse((obj) => {
                    obj.frustumCulled = false;
                });

                scene.add(vrm.scene);
                currentVrm = vrm;

                // Log info
                const meta = vrm.meta;
                const title = meta?.meta?.title || meta?.title || 'Unknown';
                document.getElementById('info').textContent = '✓ ' + title;
                console.log('VRM loaded:', title);
                console.log('Expressions:', vrm.expressionManager?.expressions?.map(e => e.name));
            },
            (progress) => {
                const pct = 100 * (progress.loaded / progress.total);
                document.getElementById('info').textContent = 'Loading... ' + pct.toFixed(0) + '%';
            },
            (error) => {
                document.getElementById('info').textContent = 'Error: ' + error.message;
                console.error('Load error:', error);
            }
        );

        // Animation loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const t = clock.elapsedTime;

            if (currentVrm) {
                // Gentle breathing animation
                const spine = currentVrm.humanoid?.getNormalizedBoneNode('spine');
                if (spine) spine.rotation.x = Math.sin(t * 1.5) * 0.015;

                // Subtle head sway
                const head = currentVrm.humanoid?.getNormalizedBoneNode('head');
                if (head) {
                    head.rotation.y = Math.sin(t * 0.7) * 0.05;
                    head.rotation.x = Math.sin(t * 0.5) * 0.02;
                }

                // Slight hip sway
                const hips = currentVrm.humanoid?.getNormalizedBoneNode('hips');
                if (hips) hips.rotation.y = Math.sin(t * 0.8) * 0.02;

                // Blink occasionally
                if (currentVrm.expressionManager) {
                    const blinkCycle = t % 4;
                    if (blinkCycle > 3.8 && blinkCycle < 3.95) {
                        currentVrm.expressionManager.setValue('blink', 1.0);
                    } else {
                        currentVrm.expressionManager.setValue('blink', 0.0);
                    }
                }

                currentVrm.update(delta);
            }

            renderer.render(scene, camera);
        }

        animate();

        // Expose for external control
        window.getVRM = () => currentVrm;
        window.takeScreenshot = () => renderer.domElement.toDataURL('image/png');
    </script>
</body>
</html>
